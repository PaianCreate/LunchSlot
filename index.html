<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fubon A25 Lunch Slot</title>
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
    <!-- 舞台：滿版藍天草地，中央擺像素大樓拉霸機 -->
    <div class="stage">
        <!-- 背景層：同圖模糊放大填滿留白（依方向換橫/直圖）-->
        <div class="backdrop"></div>

        <!-- 機台本體：背景圖依 orientation 切換橫式(1802:872)／直式(768:1376)，
             overlay 用 % 定位，座標各自在 CSS 依方向覆蓋 -->
        <div class="machine" role="img" aria-label="Fubon A25 Lunch Slot 像素大樓拉霸機">

            <!-- 上排視窗（橫式圖才有；直式時 status 隱藏、count 移到螢幕內）-->
            <div class="win win-status" id="status">待命</div>
            <div class="win win-count" id="count"></div>

            <!-- 米色主螢幕：reel 顯示區 -->
            <div class="board" aria-live="polite">
                <div class="reel-name" id="reel-name">先選類別</div>
                <div class="reel-dish" id="reel-dish">餐廳 · 小吃 · 點心</div>
                <div class="reel-note" id="reel-note"></div>
                <a class="go" id="go" href="#" target="_blank" rel="noopener" hidden>🗺 導航去</a>
            </div>

            <!-- 透明 hotspot：疊在畫好的按鈕上（座標在 CSS）-->
            <button class="hot cat" data-cat="restaurant" aria-label="餐廳"></button>
            <button class="hot cat" data-cat="streetfood" aria-label="小吃"></button>
            <button class="hot cat" data-cat="dessert"    aria-label="點心"></button>
            <button class="hot spin" id="spin" disabled aria-label="START 開始抽"></button>

            <!-- 紅色拉桿 hotspot：拉一下＝開抽 -->
            <button class="hot lever" id="lever" aria-label="拉霸開始抽"></button>
        </div>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
